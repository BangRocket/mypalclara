<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Memory Inspector</title>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }

body {
  font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
  background: #1a1a2e;
  color: #e0e0e0;
  height: 100vh;
  display: flex;
  flex-direction: column;
}

#header {
  background: #16213e;
  padding: 12px 20px;
  border-bottom: 1px solid #333;
  display: flex;
  align-items: center;
  gap: 12px;
}

#header h1 { font-size: 18px; flex-shrink: 0; }

#query-input {
  flex: 1;
  background: #2a2a4a;
  color: #e0e0e0;
  border: 1px solid #555;
  border-radius: 6px;
  padding: 8px 14px;
  font-size: 15px;
  outline: none;
}

#query-input:focus { border-color: #7eb8da; }

#user-input {
  background: #2a2a4a;
  color: #e0e0e0;
  border: 1px solid #444;
  border-radius: 6px;
  padding: 8px 10px;
  font-size: 13px;
  width: 260px;
}

#search-btn {
  background: #3a5a8a;
  color: white;
  border: none;
  border-radius: 6px;
  padding: 8px 20px;
  font-size: 14px;
  cursor: pointer;
  flex-shrink: 0;
}

#search-btn:hover { background: #4a6a9a; }
#search-btn:disabled { opacity: 0.5; cursor: not-allowed; }

#timing {
  font-size: 11px;
  color: #888;
  flex-shrink: 0;
}

/* --- Main content --- */
#content {
  flex: 1;
  overflow-y: auto;
  padding: 16px 20px;
  display: grid;
  grid-template-columns: 1fr 1fr;
  grid-template-rows: auto auto 1fr;
  gap: 12px;
}

.panel {
  background: #1e1e3a;
  border: 1px solid #333;
  border-radius: 8px;
  overflow: hidden;
}

.panel-header {
  background: #252550;
  padding: 8px 14px;
  font-size: 13px;
  font-weight: 600;
  display: flex;
  justify-content: space-between;
  align-items: center;
  border-bottom: 1px solid #333;
}

.panel-count {
  background: #3a3a6a;
  padding: 2px 8px;
  border-radius: 10px;
  font-size: 11px;
}

.panel-body {
  padding: 10px 14px;
  overflow-y: auto;
  max-height: 350px;
  font-size: 13px;
  line-height: 1.6;
}

.panel-full { grid-column: 1 / -1; }

/* --- Items --- */
.item {
  padding: 8px 10px;
  margin-bottom: 6px;
  border-radius: 4px;
  border-left: 3px solid #3a3a6a;
  background: rgba(255,255,255,0.02);
}

.item-memory { border-left-color: #2d6a4f; }
.item-episode { border-left-color: #6a4a2d; }
.item-relation { border-left-color: #4a2d6a; }
.item-arc { border-left-color: #2d4a6a; }

.item-meta {
  font-size: 11px;
  color: #888;
  margin-top: 4px;
}

.item-meta span { margin-right: 10px; }

.tag {
  display: inline-block;
  background: #3a3a5a;
  padding: 1px 6px;
  border-radius: 3px;
  font-size: 10px;
  margin-right: 4px;
}

.item-content {
  white-space: pre-wrap;
  word-break: break-word;
}

/* --- Layered context --- */
.context-block {
  background: #0a0a1a;
  padding: 12px;
  border-radius: 6px;
  white-space: pre-wrap;
  word-break: break-word;
  font-family: 'SF Mono', Monaco, monospace;
  font-size: 12px;
  line-height: 1.5;
  max-height: 500px;
  overflow-y: auto;
}

/* --- Placeholder --- */
.placeholder {
  color: #555;
  text-align: center;
  padding: 40px;
  font-size: 14px;
}
</style>
</head>
<body>

<div id="header">
  <h1>Memory Inspector</h1>
  <input type="text" id="query-input" placeholder="Enter a query to search memory..." autofocus>
  <input type="text" id="user-input" placeholder="user ID">
  <button id="search-btn" onclick="doSearch()">Search</button>
  <span id="timing"></span>
</div>

<div id="content">
  <div class="panel">
    <div class="panel-header">
      Semantic Memories <span class="panel-count" id="count-memories">0</span>
    </div>
    <div class="panel-body" id="panel-memories">
      <div class="placeholder">Enter a query above</div>
    </div>
  </div>

  <div class="panel">
    <div class="panel-header">
      Relevant Episodes <span class="panel-count" id="count-episodes">0</span>
    </div>
    <div class="panel-body" id="panel-episodes">
      <div class="placeholder">Enter a query above</div>
    </div>
  </div>

  <div class="panel">
    <div class="panel-header">
      Graph Relations <span class="panel-count" id="count-graph">0</span>
    </div>
    <div class="panel-body" id="panel-graph">
      <div class="placeholder">Enter a query above</div>
    </div>
  </div>

  <div class="panel">
    <div class="panel-header">
      Recent Episodes & Arcs
      <span>
        <span class="panel-count" id="count-recent">0</span> recent
        <span class="panel-count" id="count-arcs">0</span> arcs
      </span>
    </div>
    <div class="panel-body" id="panel-profile">
      <div class="placeholder">Enter a query above</div>
    </div>
  </div>

  <div class="panel panel-full">
    <div class="panel-header">
      Assembled Context (what the LLM sees)
    </div>
    <div class="panel-body" id="panel-context">
      <div class="placeholder">Enter a query above</div>
    </div>
  </div>
</div>

<script>
// Load default user
fetch('/api/status').then(r => r.json()).then(s => {
  document.getElementById('user-input').value = s.default_user || '';
});

document.getElementById('query-input').addEventListener('keydown', e => {
  if (e.key === 'Enter') doSearch();
});

async function doSearch() {
  const query = document.getElementById('query-input').value.trim();
  const userId = document.getElementById('user-input').value.trim();
  if (!query) return;

  const btn = document.getElementById('search-btn');
  btn.disabled = true;
  btn.textContent = 'Searching...';
  document.getElementById('timing').textContent = '';

  try {
    const res = await fetch('/api/query', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ query, user_id: userId }),
    });
    const data = await res.json();
    renderResults(data);
  } catch (e) {
    console.error(e);
  } finally {
    btn.disabled = false;
    btn.textContent = 'Search';
  }
}

function renderResults(data) {
  // Timing
  const t = data.timing || {};
  document.getElementById('timing').textContent =
    `Total: ${t.total}s | Semantic: ${t.semantic}s | Episodes: ${t.episodes}s | Graph: ${t.graph}s`;

  // Semantic memories
  const mems = data.semantic_memories || [];
  document.getElementById('count-memories').textContent = mems.length;
  document.getElementById('panel-memories').innerHTML = mems.length
    ? mems.map(m => `<div class="item item-memory">
        <div class="item-content">${esc(m.memory || m.error || '')}</div>
        <div class="item-meta">
          ${m.score ? `<span>score: ${(m.score).toFixed(3)}</span>` : ''}
          ${m.metadata?.category ? `<span class="tag">${m.metadata.category}</span>` : ''}
          ${m.metadata?.memory_type ? `<span class="tag">${m.metadata.memory_type}</span>` : ''}
        </div>
      </div>`).join('')
    : '<div class="placeholder">No memories found</div>';

  // Episodes
  const eps = data.episodes || [];
  document.getElementById('count-episodes').textContent = eps.length;
  document.getElementById('panel-episodes').innerHTML = eps.length
    ? eps.map(e => `<div class="item item-episode">
        <div><strong>${esc(e.summary || '')}</strong></div>
        <div class="item-content">${esc(e.content || e.error || '')}</div>
        <div class="item-meta">
          <span>sig: ${e.significance}</span>
          <span>tone: ${e.emotional_tone}</span>
          <span>${e.timestamp ? e.timestamp.slice(0,16) : ''}</span>
          ${(e.topics||[]).map(t => `<span class="tag">${t}</span>`).join('')}
        </div>
      </div>`).join('')
    : '<div class="placeholder">No episodes found</div>';

  // Graph
  const rels = data.graph_relations || [];
  document.getElementById('count-graph').textContent = rels.length;
  document.getElementById('panel-graph').innerHTML = rels.length
    ? rels.map(r => `<div class="item item-relation">
        <span class="tag">${r.source_type||''}</span>
        <strong>${esc(r.source||'')}</strong>
        → ${esc((r.relationship||'').replace(/_/g,' '))} →
        <strong>${esc(r.destination||'')}</strong>
        <span class="tag">${r.dest_type||''}</span>
        ${r.valid_from ? `<span class="item-meta">(${r.valid_from})</span>` : ''}
      </div>`).join('')
    : '<div class="placeholder">No relations found</div>';

  // Recent + Arcs
  const recent = data.recent_episodes || [];
  const arcs = data.active_arcs || [];
  document.getElementById('count-recent').textContent = recent.length;
  document.getElementById('count-arcs').textContent = arcs.length;

  let profileHtml = '';
  if (arcs.length) {
    profileHtml += '<div style="margin-bottom:10px"><strong>Active Arcs:</strong></div>';
    profileHtml += arcs.map(a => `<div class="item item-arc">
      <strong>${esc(a.title||'')}</strong> (${a.status||''})
      <div class="item-content">${esc(a.summary||'')}</div>
      ${a.emotional_trajectory ? `<div class="item-meta">trajectory: ${a.emotional_trajectory}</div>` : ''}
    </div>`).join('');
  }
  if (recent.length) {
    profileHtml += '<div style="margin-bottom:10px;margin-top:10px"><strong>Recent Episodes:</strong></div>';
    profileHtml += recent.map(e => `<div class="item item-episode">
      <strong>${esc(e.summary||'')}</strong>
      <div class="item-meta">
        <span>tone: ${e.emotional_tone}</span>
        <span>sig: ${e.significance}</span>
        <span>${e.timestamp ? e.timestamp.slice(0,16) : ''}</span>
      </div>
    </div>`).join('');
  }
  document.getElementById('panel-profile').innerHTML =
    profileHtml || '<div class="placeholder">No profile data</div>';

  // Layered context
  const ctx = data.layered_context || '';
  document.getElementById('panel-context').innerHTML = ctx
    ? `<div class="context-block">${esc(ctx)}</div>`
    : '<div class="placeholder">No context generated</div>';
}

function esc(text) {
  const d = document.createElement('div');
  d.textContent = text;
  return d.innerHTML;
}
</script>
</body>
</html>
