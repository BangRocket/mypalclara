<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Chat Cleaner</title>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }

body {
  font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
  background: #1a1a2e;
  color: #e0e0e0;
  display: flex;
  flex-direction: column;
  height: 100vh;
}

/* --- Header / Stats Bar --- */
#header {
  background: #16213e;
  padding: 12px 20px;
  display: flex;
  justify-content: space-between;
  align-items: center;
  border-bottom: 1px solid #333;
  flex-shrink: 0;
}

#header h1 { font-size: 18px; font-weight: 600; }

#stats {
  display: flex;
  gap: 16px;
  font-size: 13px;
}

.stat-badge {
  padding: 4px 10px;
  border-radius: 12px;
  font-weight: 600;
}

.stat-keep { background: #1b4332; color: #95d5b2; }
.stat-maybe { background: #5c4a1e; color: #f0c040; }
.stat-remove { background: #4a1a1a; color: #f08080; }
.stat-total { background: #2a2a4a; color: #a0a0d0; }

/* --- Toolbar --- */
#toolbar {
  background: #1e1e3a;
  padding: 8px 20px;
  display: flex;
  gap: 10px;
  align-items: center;
  flex-shrink: 0;
  border-bottom: 1px solid #333;
  flex-wrap: wrap;
}

#toolbar label { font-size: 12px; color: #888; }

#toolbar select, #toolbar input {
  background: #2a2a4a;
  color: #e0e0e0;
  border: 1px solid #444;
  border-radius: 4px;
  padding: 4px 8px;
  font-size: 13px;
}

#toolbar button {
  background: #3a3a6a;
  color: #e0e0e0;
  border: 1px solid #555;
  border-radius: 4px;
  padding: 4px 12px;
  font-size: 13px;
  cursor: pointer;
}

#toolbar button:hover { background: #4a4a8a; }

.spacer { flex: 1; }

/* --- Messages --- */
#messages {
  flex: 1;
  overflow-y: auto;
  padding: 10px 20px;
}

.msg {
  display: grid;
  grid-template-columns: 36px 1fr 100px;
  gap: 8px;
  padding: 8px 12px;
  margin-bottom: 4px;
  border-radius: 6px;
  border-left: 4px solid transparent;
  transition: background 0.15s, border-color 0.15s;
  align-items: start;
  font-size: 14px;
  line-height: 1.5;
}

.msg:hover { background: rgba(255,255,255,0.03); }

.msg.status-keep { border-left-color: #2d6a4f; background: rgba(45,106,79,0.08); }
.msg.status-maybe { border-left-color: #b8860b; background: rgba(184,134,11,0.08); }
.msg.status-remove { border-left-color: #8b0000; background: rgba(139,0,0,0.12); opacity: 0.6; }

.msg-indicator {
  width: 28px;
  height: 28px;
  border-radius: 50%;
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 14px;
  flex-shrink: 0;
  cursor: pointer;
}

.msg.status-keep .msg-indicator { background: #1b4332; }
.msg.status-maybe .msg-indicator { background: #5c4a1e; }
.msg.status-remove .msg-indicator { background: #4a1a1a; }

.msg-body { min-width: 0; }

.msg-meta {
  font-size: 11px;
  color: #666;
  margin-bottom: 2px;
}

.msg-meta .author { color: #7eb8da; font-weight: 600; }
.msg-meta .author.user { color: #b8d4a8; }

.msg-content {
  white-space: pre-wrap;
  word-break: break-word;
}

.msg-content code {
  background: rgba(255,255,255,0.08);
  padding: 1px 4px;
  border-radius: 3px;
  font-size: 13px;
}

.msg-content pre {
  background: rgba(0,0,0,0.3);
  padding: 8px;
  border-radius: 4px;
  overflow-x: auto;
  margin: 4px 0;
  font-size: 12px;
}

.msg-actions {
  display: flex;
  gap: 4px;
  flex-shrink: 0;
  justify-content: flex-end;
}

.msg-actions button {
  width: 28px;
  height: 28px;
  border: none;
  border-radius: 4px;
  cursor: pointer;
  font-size: 14px;
  opacity: 0.4;
  transition: opacity 0.15s;
}

.msg-actions button:hover { opacity: 1; }
.msg-actions button.active { opacity: 1; }

.btn-keep { background: #1b4332; color: #95d5b2; }
.btn-maybe { background: #5c4a1e; color: #f0c040; }
.btn-remove { background: #4a1a1a; color: #f08080; }

.msg-reason {
  font-size: 11px;
  color: #888;
  font-style: italic;
  margin-top: 2px;
}

/* --- Loading --- */
#loading {
  display: flex;
  align-items: center;
  justify-content: center;
  height: 100%;
  font-size: 16px;
  color: #888;
}

/* --- User filter pills --- */
.user-pills {
  display: flex;
  gap: 6px;
}

.user-pill {
  padding: 3px 10px;
  border-radius: 12px;
  font-size: 12px;
  cursor: pointer;
  border: 1px solid #555;
  background: #2a2a4a;
  color: #ccc;
}

.user-pill.active { background: #3a5a8a; border-color: #6a8aba; color: #fff; }
</style>
</head>
<body>

<div id="header">
  <h1>Chat Cleaner</h1>
  <div id="stats"></div>
</div>

<div id="toolbar">
  <label>Filter:</label>
  <select id="filter-status">
    <option value="all">All</option>
    <option value="keep">Keep</option>
    <option value="maybe">Maybe</option>
    <option value="remove">Remove</option>
  </select>

  <label>User:</label>
  <div id="user-pills" class="user-pills"></div>

  <label>Search:</label>
  <input type="text" id="search" placeholder="Search content..." style="width:200px">

  <div class="spacer"></div>

  <button onclick="bulkAction('maybe', 'keep')">All Maybe → Keep</button>
  <button onclick="bulkAction('maybe', 'remove')">All Maybe → Remove</button>
  <button onclick="jumpToNext('maybe')">Next Maybe ↓</button>
</div>

<div id="messages">
  <div id="loading">Loading chat data...</div>
</div>

<script>
let chatData = null;
let decisions = {};
let allUsers = new Set();
let activeUsers = new Set(); // empty = show all
let rendered = [];

async function init() {
  const [chatRes, decRes] = await Promise.all([
    fetch('/api/chat').then(r => r.json()),
    fetch('/api/decisions').then(r => r.json()),
  ]);
  chatData = chatRes;
  decisions = decRes;

  // Collect users
  chatData.messages.forEach(m => {
    const name = m.author?.name || 'unknown';
    allUsers.add(name);
  });

  renderUserPills();
  renderMessages();
  updateStats();

  // Filter listeners
  document.getElementById('filter-status').addEventListener('change', renderMessages);
  document.getElementById('search').addEventListener('input', debounce(renderMessages, 200));
}

function renderUserPills() {
  const container = document.getElementById('user-pills');
  container.innerHTML = '';
  allUsers.forEach(name => {
    const pill = document.createElement('span');
    pill.className = 'user-pill' + (activeUsers.size === 0 ? ' active' : '');
    pill.textContent = name;
    pill.onclick = () => toggleUser(name);
    container.appendChild(pill);
  });
}

function toggleUser(name) {
  if (activeUsers.has(name)) {
    activeUsers.delete(name);
  } else {
    activeUsers.add(name);
  }
  // If all selected, clear (show all)
  if (activeUsers.size === allUsers.size) activeUsers.clear();
  renderUserPills();
  // Update pill active states
  document.querySelectorAll('.user-pill').forEach(pill => {
    const isActive = activeUsers.size === 0 || activeUsers.has(pill.textContent);
    pill.classList.toggle('active', isActive);
  });
  renderMessages();
}

function renderMessages() {
  const container = document.getElementById('messages');
  const filterStatus = document.getElementById('filter-status').value;
  const searchText = document.getElementById('search').value.toLowerCase();

  // Build visible list
  const visible = chatData.messages.filter(m => {
    const d = decisions[m.id] || { status: 'keep' };
    if (filterStatus !== 'all' && d.status !== filterStatus) return false;
    if (activeUsers.size > 0 && !activeUsers.has(m.author?.name)) return false;
    if (searchText && !(m.content || '').toLowerCase().includes(searchText)) return false;
    return true;
  });

  // Virtual rendering — only render visible portion
  const html = visible.map(m => renderMessage(m)).join('');
  container.innerHTML = html || '<div id="loading">No messages match filter</div>';
  rendered = visible;
}

function renderMessage(m) {
  const d = decisions[m.id] || { status: 'keep', reason: '' };
  const author = m.author?.name || 'unknown';
  const isUser = author === 'stairmaster401';
  const ts = (m.timestamp || '').replace('T', ' ').slice(0, 16);
  const content = escapeHtml(m.content || '').replace(/```([\s\S]*?)```/g, '<pre>$1</pre>');
  const indicator = d.status === 'keep' ? '✓' : d.status === 'maybe' ? '?' : '✕';

  return `<div class="msg status-${d.status}" id="msg-${m.id}" data-id="${m.id}">
    <div class="msg-indicator" onclick="cycleStatus('${m.id}')">${indicator}</div>
    <div class="msg-body">
      <div class="msg-meta">
        <span class="author ${isUser ? 'user' : ''}">${author}</span>
        <span>${ts}</span>
      </div>
      <div class="msg-content">${content}</div>
      ${d.reason ? `<div class="msg-reason">${escapeHtml(d.reason)}</div>` : ''}
    </div>
    <div class="msg-actions">
      <button class="btn-keep ${d.status === 'keep' ? 'active' : ''}" onclick="setStatus('${m.id}','keep')">✓</button>
      <button class="btn-maybe ${d.status === 'maybe' ? 'active' : ''}" onclick="setStatus('${m.id}','maybe')">?</button>
      <button class="btn-remove ${d.status === 'remove' ? 'active' : ''}" onclick="setStatus('${m.id}','remove')">✕</button>
    </div>
  </div>`;
}

function escapeHtml(text) {
  const div = document.createElement('div');
  div.textContent = text;
  return div.innerHTML;
}

async function setStatus(id, status, reason) {
  decisions[id] = decisions[id] || {};
  decisions[id].status = status;
  if (reason !== undefined) decisions[id].reason = reason;

  await fetch('/api/decision', {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({ id, status, reason: decisions[id].reason || '' }),
  });

  // Update DOM in place
  const el = document.getElementById('msg-' + id);
  if (el) {
    el.className = 'msg status-' + status;
    el.querySelector('.msg-indicator').textContent = status === 'keep' ? '✓' : status === 'maybe' ? '?' : '✕';
    el.querySelectorAll('.msg-actions button').forEach(btn => btn.classList.remove('active'));
    el.querySelector('.btn-' + status).classList.add('active');
  }

  updateStats();
}

function cycleStatus(id) {
  const d = decisions[id] || { status: 'keep' };
  const next = { keep: 'maybe', maybe: 'remove', remove: 'keep' };
  setStatus(id, next[d.status]);
}

async function bulkAction(fromStatus, toStatus) {
  const updates = [];
  for (const [id, d] of Object.entries(decisions)) {
    if (d.status === fromStatus) {
      updates.push({ id, status: toStatus, reason: d.reason || '' });
      d.status = toStatus;
    }
  }

  if (!updates.length) return;

  await fetch('/api/bulk', {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({ updates }),
  });

  renderMessages();
  updateStats();
}

function jumpToNext(status) {
  const el = document.querySelector('.msg.status-' + status);
  if (el) el.scrollIntoView({ behavior: 'smooth', block: 'center' });
}

async function updateStats() {
  const res = await fetch('/api/stats').then(r => r.json());
  const container = document.getElementById('stats');
  container.innerHTML = `
    <span class="stat-badge stat-total">Total: ${res.total}</span>
    <span class="stat-badge stat-keep">Keep: ${res.keep}</span>
    <span class="stat-badge stat-maybe">Maybe: ${res.maybe}</span>
    <span class="stat-badge stat-remove">Remove: ${res.remove}</span>
  `;
}

function debounce(fn, ms) {
  let timer;
  return (...args) => {
    clearTimeout(timer);
    timer = setTimeout(() => fn(...args), ms);
  };
}

init();
</script>
</body>
</html>
