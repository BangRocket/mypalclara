# Client (adapters) compose for MyPalClara.
#
# The engine — gateway, runtime, memory/Palace, LLM, tools, MCP, sandbox, database —
# now lives in the separate `mypal-engine` repo and runs on its own. These adapters
# are WS/HTTP clients of a RUNNING engine: point CLARA_GATEWAY_URL (ws, :18789) and
# CLARA_GATEWAY_API_URL (http, :18790) at it, with a matching CLARA_GATEWAY_SECRET.
# By default they reach the engine on the docker host.
#
# Usage:
#   docker compose --profile discord up      # Discord adapter
#   docker compose --profile teams up        # Teams adapter

x-engine-env: &engine-env
  CLARA_GATEWAY_URL: ${CLARA_GATEWAY_URL:-ws://host.docker.internal:18789}
  CLARA_GATEWAY_API_URL: ${CLARA_GATEWAY_API_URL:-http://host.docker.internal:18790}
  CLARA_GATEWAY_SECRET: ${CLARA_GATEWAY_SECRET:?CLARA_GATEWAY_SECRET is required (must match the engine)}
  USE_GATEWAY: "true"
  LOG_LEVEL: ${LOG_LEVEL:-INFO}

services:
  discord-adapter:
    image: ${REGISTRY:-}mypalclara-discord:latest
    build:
      context: .
      dockerfile: services/discord/Dockerfile
    container_name: mypalclara-discord-adapter
    profiles: [discord, adapters]
    environment:
      <<: *engine-env
      DISCORD_BOT_TOKEN: ${DISCORD_BOT_TOKEN}
      DISCORD_CLIENT_ID: ${DISCORD_CLIENT_ID:-}
      DISCORD_ALLOWED_SERVERS: ${DISCORD_ALLOWED_SERVERS:-}
      DISCORD_ALLOWED_CHANNELS: ${DISCORD_ALLOWED_CHANNELS:-}
      DISCORD_ALLOWED_ROLES: ${DISCORD_ALLOWED_ROLES:-}
      DISCORD_MAX_MESSAGES: ${DISCORD_MAX_MESSAGES:-25}
    extra_hosts:
      - "host.docker.internal:host-gateway"
    restart: unless-stopped

  teams-adapter:
    image: ${REGISTRY:-}mypalclara-teams:latest
    build:
      context: .
      dockerfile: services/discord/Dockerfile
    command: ["python", "-m", "mypalclara.adapters.teams"]
    container_name: mypalclara-teams-adapter
    profiles: [teams]
    ports:
      - "3978:3978"
    environment:
      <<: *engine-env
      TEAMS_APP_ID: ${TEAMS_APP_ID}
      TEAMS_APP_PASSWORD: ${TEAMS_APP_PASSWORD}
      TEAMS_PORT: "3978"
    extra_hosts:
      - "host.docker.internal:host-gateway"
    restart: unless-stopped
